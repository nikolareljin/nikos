<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e3440"/>
      <stop offset="100%" style="stop-color:#3b4252"/>
    </linearGradient>
    <!-- Subtle radial glow behind logo -->
    <radialGradient id="glow" cx="50%" cy="48%" r="28%">
      <stop offset="0%" style="stop-color:#434c5e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2e3440;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Radial glow behind the logo -->
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- ── Hex network lines ── -->
  <!-- upper-left node → top node  (bright blue) -->
  <line x1="793" y1="418" x2="942" y2="338" stroke="#2196F3" stroke-width="4.5" stroke-linecap="round"/>
  <!-- top node → upper-right node  (muted) -->
  <line x1="978" y1="338" x2="1128" y2="400" stroke="#90a4ae" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- lower-left node → lower-center node  (bright blue) -->
  <line x1="797" y1="614" x2="940" y2="655" stroke="#2196F3" stroke-width="4.5" stroke-linecap="round"/>
  <!-- lower-center node → lower-right node  (muted) -->
  <line x1="988" y1="655" x2="1122" y2="618" stroke="#90a4ae" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Hex network nodes ── -->
  <!-- Top-center: bright blue -->
  <circle cx="960" cy="330" r="26" fill="#2196F3"/>
  <!-- Upper-left: bright blue (largest) -->
  <circle cx="770" cy="424" r="33" fill="#2196F3"/>
  <!-- Upper-right: muted blue-grey -->
  <circle cx="1145" cy="398" r="24" fill="#90a4ae"/>
  <!-- Lower-left: bright blue, rounded-square (matches logo's hexagonal node) -->
  <rect x="749" y="591" width="52" height="52" rx="14" ry="14" fill="#2196F3"/>
  <!-- Lower-center: bright blue -->
  <circle cx="964" cy="664" r="28" fill="#2196F3"/>
  <!-- Lower-right: muted blue-grey (smaller) -->
  <circle cx="1138" cy="626" r="21" fill="#90a4ae"/>

  <!-- ── NikOS wordmark ── -->
  <text x="960" y="570"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="118"
        font-weight="800"
        fill="#eceff4"
        text-anchor="middle"
        letter-spacing="-3">NikOS</text>

  <!-- ── Tagline ── -->
  <text x="960" y="730"
        font-family="'Courier New', monospace"
        font-size="17"
        fill="#81a1c1"
        text-anchor="middle"
        letter-spacing="5">LIGHT SYSTEM. HEAVY THINKING.</text>
</svg>
