<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e3440"/>
      <stop offset="100%" style="stop-color:#3b4252"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Geometric accent shapes - Nord palette -->
  <polygon points="0,1080 400,600 0,400" fill="#434c5e" opacity="0.6"/>
  <polygon points="1920,0 1520,480 1920,600" fill="#4c566a" opacity="0.5"/>
  <polygon points="800,1080 1200,800 1600,1080" fill="#3b4252" opacity="0.8"/>
  <!-- Accent line - Nord frost -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#88c0d0" stroke-width="1" opacity="0.15"/>
  <!-- NikOS wordmark - center -->
  <text x="960" y="510" font-family="monospace" font-size="64" font-weight="bold"
        fill="#88c0d0" text-anchor="middle" opacity="0.9">NikOS</text>
  <text x="960" y="570" font-family="monospace" font-size="20"
        fill="#81a1c1" text-anchor="middle" opacity="0.7">Neural Innovation for Knowledge OS</text>
  <text x="960" y="610" font-family="monospace" font-size="14"
        fill="#4c566a" text-anchor="middle" opacity="0.9">Light system. Heavy thinking.</text>
</svg>
