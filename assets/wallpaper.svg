<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e3440"/>
      <stop offset="100%" style="stop-color:#3b4252"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="28%">
      <stop offset="0%" style="stop-color:#434c5e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2e3440;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!--
    Node centres (all symmetric across x=960):
      Top-center:    (960, 330)  r=26
      Upper-left:    (770, 424)  r=33   ←→  Upper-right: (1150, 424) r=24
      Lower-left:    (775, 617)  52×52 rect  ←→  Lower-right: (1145, 617) r=21
      Lower-center:  (964, 664)  r=28
  -->

  <!-- ── Lines (drawn before nodes so nodes sit on top) ── -->

  <!-- Upper-left → Top  (bright blue) -->
  <line x1="800" y1="409" x2="937" y2="342"
        stroke="#2196F3" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Top → Upper-right  (muted, symmetric) -->
  <line x1="983" y1="342" x2="1129" y2="409"
        stroke="#90a4ae" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Lower-left → Lower-center  (bright blue) -->
  <line x1="801" y1="623" x2="937" y2="657"
        stroke="#2196F3" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Lower-center → Lower-right  (muted, symmetric) -->
  <line x1="991" y1="657" x2="1125" y2="623"
        stroke="#90a4ae" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Nodes ── -->

  <!-- Top-center -->
  <circle cx="960" cy="330" r="26" fill="#2196F3"/>

  <!-- Upper-left (r=33) ←→ Upper-right (r=24, muted) — same y=424 -->
  <circle cx="770"  cy="424" r="33" fill="#2196F3"/>
  <circle cx="1150" cy="424" r="24" fill="#90a4ae"/>

  <!-- Lower-left rounded-rect, centre (775,617) ←→ Lower-right circle, centre (1145,617) -->
  <rect x="749" y="591" width="52" height="52" rx="14" ry="14" fill="#2196F3"/>
  <circle cx="1145" cy="617" r="21" fill="#90a4ae"/>

  <!-- Lower-center -->
  <circle cx="964" cy="664" r="28" fill="#2196F3"/>

  <!-- ── Wordmark ── -->
  <text x="960" y="570"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="118"
        font-weight="800"
        fill="#eceff4"
        text-anchor="middle"
        letter-spacing="-3">NikOS</text>

  <!-- ── Full name ── -->
  <text x="960" y="710"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="19"
        fill="#81a1c1"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.85">Neural Innovation for Knowledge OS</text>

  <!-- ── Tagline ── -->
  <text x="960" y="748"
        font-family="'Courier New', monospace"
        font-size="15"
        fill="#4c566a"
        text-anchor="middle"
        letter-spacing="5">LIGHT SYSTEM. HEAVY THINKING.</text>
</svg>
