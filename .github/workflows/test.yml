name: Dry-run Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-playbook:
    uses: nikolareljin/ci-helpers/.github/workflows/ci.yml@production
    with:
      runner: ubuntu-24.04
      extra_command: |
        sudo apt-get update
        sudo apt-get install -y ansible
        ansible-galaxy collection install community.general
        ANSIBLE_FORCE_COLOR=1 ansible-playbook site.yml -i inventory/local --check --skip-tags network,music,education
