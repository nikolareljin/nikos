---
- name: NikOS Setup
  hosts: local  # inventory group defined in inventory/local
  become: true
  vars_files:
    - vars/main.yml
  vars:
    # lookup runs on the controller before privilege escalation — gives the real user's home
    nikos_home: "{{ lookup('env', 'HOME') }}"
  pre_tasks:
    - name: Check whether local override vars exist
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/vars/local.yml"
      register: local_vars_stat
      tags: [always]

    - name: Load local override vars
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/local.yml"
      when: local_vars_stat.stat.exists
      tags: [always]

    - name: Check whether playbook directory is a git checkout
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/.git"
      register: playbook_git_stat
      tags: [always]

    # Remove any old-format vscode.list entry. The playbook now uses DEB822
    # (vscode.sources + microsoft.gpg) which matches what VS Code's own dpkg
    # postinst writes, so the two entries are always identical and never conflict.
    - name: Remove legacy VS Code apt source list before any apt operations
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/vscode.list
        state: absent
      tags: [always]

    - name: Find any remaining VS Code apt source files before any apt operations
      ansible.builtin.shell: >
        grep -rl "packages.microsoft.com/repos/code"
        /etc/apt/sources.list.d/ 2>/dev/null || true
      register: vscode_source_files
      changed_when: false
      tags: [always]

    - name: Remove any remaining VS Code apt source files before any apt operations
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ vscode_source_files.stdout_lines }}"
      # Exclude vscode.sources — that is now the canonical file managed by this playbook
      when: >-
        (vscode_source_files.stdout_lines | length) > 0 and
        item != '/etc/apt/sources.list.d/vscode.sources'
      tags: [always]

  roles:
    - role: base
    - role: desktop
    - role: theming
    - role: github-setup
      become: false
    - role: ai-stack
      become: false
      tags: [ai-local]
    - role: editors
      become: false
    - role: cloud-ai-cli
      become: false
    - role: agent-dev
      become: false
    - role: dev-tools
      become: false
    - role: network
      tags: [network]
    - role: music
      tags: [music]
    - role: education
      tags: [education]
    - role: neovim
      become: false
      tags: [neovim]
    - role: java
      tags: [java]
    - role: podman
      tags: [podman]

  post_tasks:
    - name: Initialize git submodules (script-helpers)  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git submodule update --init --recursive
        chdir: "{{ playbook_dir }}"
      become: false
      register: submodule_result
      changed_when: >-
        submodule_result.rc == 0 and (
          'Submodule path ' in (submodule_result.stdout | default('')) or
          'Submodule path ' in (submodule_result.stderr | default('')) or
          'Cloning into ' in (submodule_result.stdout | default('')) or
          'Cloning into ' in (submodule_result.stderr | default(''))
        )
      when:
        - playbook_git_stat.stat.exists
        - not ansible_check_mode

    - name: Check nikos CLI script exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/scripts/nikos"
      register: nikos_cli_stat

    - name: Install nikos CLI
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/scripts/nikos"
        dest: /usr/local/bin/nikos
        mode: "0755"
      become: true
      when: nikos_cli_stat.stat.exists
