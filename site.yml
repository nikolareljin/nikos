---
- name: NikOS Setup
  hosts: local  # inventory group defined in inventory/local
  become: true
  vars_files:
    - vars/main.yml
  vars:
    # lookup runs on the controller before privilege escalation — gives the real user's home
    nikos_home: "{{ lookup('env', 'HOME') }}"

  roles:
    - role: base
    - role: desktop
    - role: theming
    - role: github-setup
      become: false
    - role: ai-stack
      become: false
    - role: editors
      become: false
    - role: cloud-ai-cli
      become: false
    - role: agent-dev
      become: false
    - role: dev-tools
      become: false
    - role: optional/network
      tags: [network]
    - role: optional/music
      tags: [music]
    - role: optional/education
      tags: [education]

  post_tasks:
    - name: Check nikos CLI script exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/scripts/nikos"
      register: nikos_cli_stat

    - name: Install nikos CLI
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/scripts/nikos"
        dest: /usr/local/bin/nikos
        mode: "0755"
      become: true
      when: nikos_cli_stat.stat.exists
