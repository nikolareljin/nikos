---
- name: Create NikOS asset directory
  ansible.builtin.file:
    path: /usr/share/nikos
    state: directory
    mode: "0755"

- name: Copy wallpaper SVG
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/assets/wallpaper.svg"
    dest: /usr/share/nikos/wallpaper.svg
    mode: "0644"

- name: Export wallpaper SVG to PNG
  ansible.builtin.command: >
    inkscape /usr/share/nikos/wallpaper.svg
    --export-filename=/usr/share/nikos/wallpaper.png
    --export-width=1920 --export-height=1080
  args:
    creates: /usr/share/nikos/wallpaper.png
  when: not ansible_check_mode

- name: Install Papirus icon theme
  ansible.builtin.apt:
    name: papirus-icon-theme
    state: present

- name: Download Nordic GTK theme
  ansible.builtin.get_url:
    url: "{{ nordic_gtk_url }}"
    dest: /tmp/Nordic.tar.xz
    mode: "0644"
  when: not ansible_check_mode

- name: Create themes directory
  ansible.builtin.file:
    path: /usr/share/themes
    state: directory
    mode: "0755"

- name: Extract Nordic GTK theme
  ansible.builtin.unarchive:
    src: /tmp/Nordic.tar.xz
    dest: /usr/share/themes/
    remote_src: true
    creates: /usr/share/themes/Nordic
  when: not ansible_check_mode

- name: Clone Nordic repo (for GRUB theme)
  ansible.builtin.git:
    repo: https://github.com/EliverLara/Nordic.git
    dest: /tmp/Nordic-git
    depth: 1
    version: master
  when: not ansible_check_mode

- name: Create GRUB themes directory
  ansible.builtin.file:
    path: /boot/grub/themes
    state: directory
    mode: "0755"

- name: Locate Nordic GRUB theme
  ansible.builtin.find:
    paths: /tmp/Nordic-git
    patterns: theme.txt
    recurse: true
    file_type: file
  register: theming_nordic_grub_theme_files
  when: not ansible_check_mode

- name: Set Nordic GRUB theme directory
  ansible.builtin.set_fact:
    theming_nordic_grub_theme_dir: "{{ (theming_nordic_grub_theme_files.files | map(attribute='path') | first) | dirname }}"
  when:
    - not ansible_check_mode
    - (theming_nordic_grub_theme_files.matched | default(0)) | int > 0

- name: Install Nordic GRUB theme
  ansible.builtin.copy:
    src: "{{ theming_nordic_grub_theme_dir }}/"
    dest: /boot/grub/themes/Nordic/
    remote_src: true
    mode: "0644"
    directory_mode: "0755"
  when:
    - not ansible_check_mode
    - theming_nordic_grub_theme_dir is defined

- name: Configure GRUB to use Nordic theme
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: "^#?GRUB_THEME="
    line: 'GRUB_THEME="/boot/grub/themes/Nordic/theme.txt"'
  when:
    - ansible_check_mode or theming_nordic_grub_theme_dir is defined
  notify: Theming_update_grub

- name: Warn when Nordic GRUB theme is unavailable
  ansible.builtin.debug:
    msg: "Nordic GRUB theme was not found in the cloned repo; skipping GRUB theme installation."
  when:
    - not ansible_check_mode
    - theming_nordic_grub_theme_dir is not defined

- name: Install Plymouth and themes package
  ansible.builtin.apt:
    name:
      - plymouth
      - plymouth-themes
    state: present

- name: Copy NikOS logo PNG to system asset directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/assets/logo.png"
    dest: /usr/share/nikos/logo.png
    mode: "0644"

- name: Copy NikOS logo SVG to system asset directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/assets/logo.svg"
    dest: /usr/share/nikos/logo.svg
    mode: "0644"

- name: Create NikOS Plymouth theme directory
  ansible.builtin.file:
    path: /usr/share/plymouth/themes/nikos
    state: directory
    mode: "0755"

- name: Copy NikOS Plymouth theme descriptor
  ansible.builtin.copy:
    src: plymouth/nikos.plymouth
    dest: /usr/share/plymouth/themes/nikos/nikos.plymouth
    mode: "0644"
  notify: Theming_update_initramfs

- name: Copy NikOS Plymouth theme script
  ansible.builtin.copy:
    src: plymouth/nikos.script
    dest: /usr/share/plymouth/themes/nikos/nikos.script
    mode: "0644"
  notify: Theming_update_initramfs

- name: Copy NikOS logo into Plymouth theme directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/assets/logo.png"
    dest: /usr/share/plymouth/themes/nikos/nikos-logo.png
    mode: "0644"
  notify: Theming_update_initramfs

- name: Set NikOS as default Plymouth theme
  community.general.ini_file:
    path: /etc/plymouth/plymouthd.conf
    section: Daemon
    option: Theme
    value: nikos
    mode: "0644"
  notify: Theming_update_initramfs

- name: Ensure LightDM config directory exists
  ansible.builtin.file:
    path: /etc/lightdm
    state: directory
    mode: "0755"

- name: Ensure system-wide Xfce xfconf directory exists
  ansible.builtin.file:
    path: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml
    state: directory
    mode: "0755"

# System-wide defaults (applied for new user accounts only)
- name: Deploy system-wide Xfce appearance defaults
  ansible.builtin.copy:
    src: xsettings.xml
    dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml
    mode: "0644"

- name: Deploy system-wide Xfce window manager theme defaults
  ansible.builtin.copy:
    src: xfwm4.xml
    dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
    mode: "0644"

- name: Deploy system-wide Xfce wallpaper defaults
  ansible.builtin.copy:
    src: xfce4-desktop.xml
    dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml
    mode: "0644"

- name: Deploy LightDM GTK greeter config
  ansible.builtin.copy:
    src: lightdm-gtk-greeter.conf
    dest: /etc/lightdm/lightdm-gtk-greeter.conf
    mode: "0644"

# ── Apply theme settings to current user ─────────────────────────────────────
# System-wide /etc/xdg/ defaults are only loaded for brand-new user accounts
# with no personal config. Existing users need direct writes to their own
# ~/.config/xfce4/xfconf/xfce-perchannel-xml/ store.

- name: Ensure user Xfce xfconf directory exists
  ansible.builtin.file:
    path: "{{ nikos_home }}/.config/xfce4/xfconf/xfce-perchannel-xml"
    state: directory
    mode: "0755"
  become: false

- name: Apply GTK theme and icon theme to user xfconf
  ansible.builtin.copy:
    src: xsettings.xml
    dest: "{{ nikos_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml"
    mode: "0600"
  become: false

- name: Apply window manager theme to user xfconf
  ansible.builtin.copy:
    src: xfwm4.xml
    dest: "{{ nikos_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml"
    mode: "0600"
  become: false

- name: Apply NikOS wallpaper to all configured monitor backdrop paths
  # Replace every last-image value regardless of monitor name, so the wallpaper
  # is applied for all displays (eDP-1, HDMI, VirtualBox, etc.) without needing
  # to know the monitor identifier in advance.
  ansible.builtin.replace:
    path: "{{ nikos_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml"
    regexp: '(property name="last-image" type="string" value=")[^"]*(")'
    replace: '\g<1>/usr/share/nikos/wallpaper.png\g<2>'
  become: false
  failed_when: false  # file may not exist on first login; system-wide default covers that

- name: Set wallpaper image-style to Zoomed for all configured monitors
  # image-style int values: 0=None 1=Centered 2=Tiled 3=Stretched 4=Scaled 5=Zoomed
  # Some monitors default to 0 (None), which hides the wallpaper entirely.
  ansible.builtin.replace:
    path: "{{ nikos_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml"
    regexp: '(property name="image-style" type="int" value=")[^"]*(")'
    replace: '\g<1>5\g<2>'
  become: false
  failed_when: false

- name: Apply theme settings live via xfconf-query (if Xfce session is running)
  # xfconf-query writes via D-Bus/xfconfd; changes take effect immediately in a
  # running session. If no session is active the command fails silently — the
  # file-level changes above ensure settings load on next login.
  ansible.builtin.shell: |
    set -o pipefail
    xfconf-query -c xsettings   -p /Net/ThemeName     -s "Nordic"        2>/dev/null || true
    xfconf-query -c xsettings   -p /Net/IconThemeName -s "Papirus-Dark"  2>/dev/null || true
    xfconf-query -c xfwm4       -p /general/theme     -s "Nordic"        2>/dev/null || true
    for p in $(xfconf-query -c xfce4-desktop -l 2>/dev/null | grep '/last-image$'); do
      xfconf-query -c xfce4-desktop -p "${p}" -s "/usr/share/nikos/wallpaper.png" 2>/dev/null || true
      xfconf-query -c xfce4-desktop -p "${p%/last-image}/image-style" \
        --create --type int -s 5 2>/dev/null || true
    done
    # Ensure a canonical default path exists for newly created workspaces
    xfconf-query -c xfce4-desktop \
      -p /backdrop/screen0/monitor0/workspace0/last-image \
      --create --type string -s "/usr/share/nikos/wallpaper.png" 2>/dev/null || true
    xfconf-query -c xfce4-desktop \
      -p /backdrop/screen0/monitor0/workspace0/image-style \
      --create --type int -s 5 2>/dev/null || true
  args:
    executable: /bin/bash
  become: false
  changed_when: false
  failed_when: false
  when: not ansible_check_mode
