---
- name: Remove GNOME session if installed
  ansible.builtin.apt:
    name:
      - gnome-session
      - ubuntu-desktop
    state: absent
    autoremove: true
  ignore_errors: true # noqa: ignore-errors

- name: Install Xfce desktop environment
  ansible.builtin.apt:
    name:
      - xfce4
      - xfce4-goodies
      - xfce4-terminal
      - lightdm
      - lightdm-gtk-greeter
      - lightdm-gtk-greeter-settings
    state: present

- name: Set LightDM as default display manager
  ansible.builtin.copy:
    content: "/usr/sbin/lightdm\n"
    dest: /etc/X11/default-display-manager
    owner: root
    group: root
    mode: "0644"

- name: Enable LightDM service
  ansible.builtin.systemd:
    name: lightdm
    enabled: true
  when: not ansible_check_mode

- name: Create system-wide Xfce4 xfconf directory
  ansible.builtin.file:
    path: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml
    state: directory
    mode: "0755"

- name: Deploy system-wide Xfce panel config
  ansible.builtin.copy:
    src: xfce4-panel.xml
    dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml
    owner: root
    group: root
    mode: "0644"
