---
# ── Detect base OS variant ────────────────────────────────────────────────────
# On Xubuntu: xfce4 is pre-installed, gnome-session is absent — nothing to remove.
# On Ubuntu (GNOME): gnome-session is present — we remove it and install Xfce.

- name: Check if GNOME session is installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' gnome-session
  register: desktop_gnome_check
  changed_when: false
  failed_when: false

- name: Remove GNOME desktop (Ubuntu → Xfce migration)
  when: desktop_gnome_check.rc == 0 and 'install ok installed' in desktop_gnome_check.stdout
  block:
    - name: Purge gnome-session and ubuntu-desktop meta-packages
      ansible.builtin.apt:
        name:
          - gnome-session
          - ubuntu-desktop
          - ubuntu-desktop-minimal
        state: absent
        purge: true

    - name: Autoremove GNOME dependencies
      ansible.builtin.apt:
        autoremove: true

# ── Xfce + LightDM (idempotent — safe to run on Xubuntu too) ─────────────────

- name: Install Xfce desktop environment
  ansible.builtin.apt:
    name:
      - xfce4
      - xfce4-goodies
      - xfce4-terminal
      - lightdm
      - lightdm-gtk-greeter
      - lightdm-gtk-greeter-settings
    state: present

- name: Set LightDM as default display manager
  ansible.builtin.copy:
    content: "/usr/sbin/lightdm\n"
    dest: /etc/X11/default-display-manager
    owner: root
    group: root
    mode: "0644"

- name: Enable LightDM service
  ansible.builtin.systemd:
    name: lightdm
    enabled: true
  when: not ansible_check_mode

- name: Create system-wide Xfce4 xfconf directory
  ansible.builtin.file:
    path: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml
    state: directory
    mode: "0755"

- name: Deploy system-wide Xfce panel config
  ansible.builtin.copy:
    src: xfce4-panel.xml
    dest: /etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml
    owner: root
    group: root
    mode: "0644"
