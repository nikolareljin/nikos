---
- name: Install nala (apt frontend)
  ansible.builtin.apt:
    name: nala
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
    update_cache: false
    cache_valid_time: 3600

- name: Install core dependencies
  ansible.builtin.apt:
    name:
      - git
      - curl
      - wget
      - build-essential
      - python3-pip
      - python3-venv
      - flatpak
      - gnupg
      - lsb-release
      - ca-certificates
      - software-properties-common
      - xfconf
      - inkscape  # required by theming role to export wallpaper SVG to PNG
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ nikos_timezone }}"

- name: Set locale
  community.general.locale_gen:
    name: "{{ nikos_locale }}"
    state: present

- name: Add Flathub remote
  ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  register: base_flathub_result
  changed_when: "'already exists' not in (base_flathub_result.stderr | default(''))"
