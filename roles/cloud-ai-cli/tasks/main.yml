---
- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/setup_20.x
    dest: /tmp/nodesource_setup.sh
    mode: "0755"
  become: true
  tags: [ai-gemini, ai-claude]

- name: Run NodeSource setup
  ansible.builtin.command: bash /tmp/nodesource_setup.sh
  become: true
  changed_when: false
  when: not ansible_check_mode
  tags: [ai-gemini, ai-claude]

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: not ansible_check_mode
  tags: [ai-gemini, ai-claude]

- name: Install Gemini CLI
  community.general.npm:
    name: "@google/gemini-cli"
    global: true
    state: present
  become: true
  when: not ansible_check_mode
  tags: [ai-gemini]

- name: Check GitHub CLI authentication status
  ansible.builtin.command: gh auth status
  register: cloud_ai_cli_gh_auth
  changed_when: false
  failed_when: false
  tags: [ai-copilot-cli]

- name: Install GitHub Copilot CLI extension
  ansible.builtin.command: gh extension install github/gh-copilot
  args:
    creates: "{{ nikos_home }}/.local/share/gh/extensions/gh-copilot"
  when: cloud_ai_cli_gh_auth.rc == 0
  tags: [ai-copilot-cli]

- name: Skip GitHub Copilot CLI extension until gh is authenticated
  ansible.builtin.debug:
    msg: "Skipping GitHub Copilot CLI extension install because gh is not authenticated yet. Run 'gh auth login' and rerun NikOS update to add it."
  when: cloud_ai_cli_gh_auth.rc != 0
  tags: [ai-copilot-cli]
