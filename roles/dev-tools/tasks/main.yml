---
- name: Ensure Projects directory exists
  ansible.builtin.file:
    path: "{{ nikos_home }}/Projects"
    state: directory
    mode: "0755"

# ── distrodeck (installs Rust/cargo, bat, eza, fzf, lazygit, gh, go, docker…) ──

- name: Clone distrodeck
  ansible.builtin.git:
    repo: https://github.com/nikolareljin/distrodeck.git
    dest: "{{ nikos_home }}/Projects/distrodeck"
    version: main
    update: false

- name: Install distrodeck PATH wrapper
  ansible.builtin.copy:
    dest: /usr/local/bin/distrodeck
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      exec "{{ nikos_home }}/Projects/distrodeck/distrodeck" "$@"
  become: true
  when: not ansible_check_mode

- name: Install all developer tools via distrodeck
  ansible.builtin.command: "{{ nikos_home }}/Projects/distrodeck/distrodeck install-tools --all"
  changed_when: false
  args:
    creates: "{{ nikos_home }}/.local/state/distrodeck/installed-tools.txt"
  when: not ansible_check_mode

# ── image-view (terminal image preview — requires cargo from distrodeck) ──

- name: Clone image-view
  ansible.builtin.git:
    repo: https://github.com/nikolareljin/image-view.git
    dest: "{{ nikos_home }}/Projects/image-view"
    version: main
    update: false

- name: Resolve cargo binary for image-view build
  # Prefer the rustup-managed cargo over any system apt cargo.
  # The apt cargo on Ubuntu 24.04 is 1.75.0, which predates edition2024 (stabilised
  # in Rust 1.85). Transitive dependencies of image-view (e.g. moxcms) require
  # edition2024, so we must use the toolchain rustup installed via distrodeck.
  ansible.builtin.shell: |
    if command -v rustup &>/dev/null && rustup which cargo &>/dev/null 2>&1; then
      rustup which cargo
    elif command -v cargo &>/dev/null; then
      command -v cargo
    fi
  register: dev_tools_cargo_path
  changed_when: false
  failed_when: false

- name: Check whether image-view binary is already installed
  ansible.builtin.stat:
    path: "{{ nikos_home }}/.local/bin/image-view"
  register: dev_tools_image_view_bin

- name: Remove image-view Cargo.lock before build
  # Ensure the lock file is regenerated by whatever cargo version is in use
  # rather than keeping one written by an incompatible Cargo (version 4 format).
  ansible.builtin.file:
    path: "{{ nikos_home }}/Projects/image-view/Cargo.lock"
    state: absent
  when:
    - not ansible_check_mode
    - dev_tools_cargo_path.stdout | default('') | length > 0
    - not dev_tools_image_view_bin.stat.exists

- name: Build and install image-view
  ansible.builtin.command: "{{ nikos_home }}/Projects/image-view/setup"
  environment:
    HOME: "{{ nikos_home }}"
    INSTALL_DIR: "{{ nikos_home }}/.local/bin"
    # Prepend the resolved cargo's bin dir so the setup script finds the right cargo.
    PATH: "{{ (dev_tools_cargo_path.stdout | dirname) + ':' + ansible_env.PATH }}"
  args:
    creates: "{{ nikos_home }}/.local/bin/image-view"
  when:
    - not ansible_check_mode
    - dev_tools_cargo_path.stdout | default('') | length > 0

- name: Skip image-view install when cargo was not found
  ansible.builtin.debug:
    msg: "Skipping image-view: no cargo binary found. Select Rust in distrodeck install-tools, then rerun nikos update."
  when:
    - not ansible_check_mode
    - dev_tools_cargo_path.stdout | default('') | length == 0

# ── git-lantern (repo dashboard CLI — command: lantern) ──

- name: Clone git-lantern
  ansible.builtin.git:
    repo: https://github.com/nikolareljin/git-lantern.git
    dest: "{{ nikos_home }}/Projects/git-lantern"
    version: main
    update: false
    recursive: false

- name: Install git-lantern
  ansible.builtin.command: >
    {{ nikos_home }}/Projects/git-lantern/install
    --prefix /opt/git-lantern
    --bin-link /usr/local/bin/lantern
  become: true
  args:
    creates: /usr/local/bin/lantern
  when: not ansible_check_mode

# ── ai-runner (local Ollama model runner with simple UI) ──

- name: Clone ai-runner
  ansible.builtin.git:
    repo: https://github.com/nikolareljin/ai-runner.git
    dest: "{{ nikos_home }}/Projects/ai-runner"
    version: main
    update: false
  tags: [ai-runner]
