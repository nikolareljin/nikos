---
- name: Remove legacy VS Code apt source file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent
  become: true

- name: Remove legacy Microsoft VS Code keyring
  ansible.builtin.file:
    path: /usr/share/keyrings/microsoft.gpg
    state: absent
  become: true

- name: Add Microsoft VS Code apt key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /usr/share/keyrings/microsoft.asc
    mode: "0644"
  become: true

- name: Add VS Code apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.asc]
      https://packages.microsoft.com/repos/code stable main
    filename: vscode
  become: true

- name: Install VS Code
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: not ansible_check_mode

- name: Install JetBrains Mono font
  ansible.builtin.apt:
    name: fonts-jetbrains-mono
    state: present
  become: true

- name: Install VS Code extensions
  ansible.builtin.command: code --install-extension {{ item }} --force
  loop: "{{ nikos_vscode_extensions | difference(nikos_vscode_ai_extensions) }}"
  changed_when: false
  when: not ansible_check_mode

- name: Install AI VS Code extensions
  ansible.builtin.command: code --install-extension {{ item }} --force
  loop: "{{ nikos_vscode_extensions | intersect(nikos_vscode_ai_extensions) }}"
  changed_when: false
  when: not ansible_check_mode
  tags: [ai-vscode]

- name: Ensure VS Code user settings directory exists
  ansible.builtin.file:
    path: "{{ nikos_home }}/.config/Code/User"
    state: directory
    mode: "0755"

- name: Deploy NikOS VS Code settings
  ansible.builtin.template:
    src: vscode-settings.json.j2
    dest: "{{ nikos_home }}/.config/Code/User/settings.json"
    mode: "0644"
