---
- name: Install agent development Python packages in nikos-ai env
  ansible.builtin.command: >
    {{ nikos_home }}/miniforge3/envs/{{ nikos_conda_env }}/bin/pip install
    langchain langchain-community langchain-openai
    llama-index llama-index-llms-ollama
    openai anthropic instructor
    fastapi uvicorn httpx
  changed_when: false
  tags: [ai-local]

- name: Install Claude Code globally via npm
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present
  tags: [ai-claude]
