---
nikos_version: "0.1.0"  # NikOS playbook version

# Timezone and locale
nikos_timezone: "Europe/Belgrade"
nikos_locale: "en_US.UTF-8"

# Theme
nordic_gtk_url: "https://github.com/EliverLara/Nordic/releases/download/v2.2.0/Nordic.tar.xz"
nordic_grub_url: "https://github.com/EliverLara/Nordic/releases/download/v2.2.0/Nordic-grub.tar.xz"

# Ollama
ollama_default_model: "qwen2.5-coder:7b"

# Python / conda
miniforge_version: "24.11.3-0"
miniforge_url: "https://github.com/conda-forge/miniforge/releases/download/{{ miniforge_version }}/Miniforge3-{{ miniforge_version }}-Linux-x86_64.sh"
nikos_conda_env: "nikos-ai"
nikos_python_version: "3.11"

# VS Code extensions
nikos_vscode_extensions:
  - "Continue.continue"
  - "eamodio.gitlens"
  - "GitHub.copilot"
  - "ms-python.python"
  - "ms-toolsai.jupyter"
  - "arcticicestudio.nord-visual-studio-code"
  - "ms-vscode-remote.remote-ssh"
  - "ms-azuretools.vscode-docker"
  - "humao.rest-client"
